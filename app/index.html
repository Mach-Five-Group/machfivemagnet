    <!-- App shell layout — MIRRORS apps/client-saas/index.html (keep in sync). main.js only
         looks these elements up, so they must exist in the served HTML. The authenticated
         app is light; #app-shell escapes launCh's dark base so pages render on a light surface. -->
    <style>
      #app-shell {
        min-height: 100vh;
        background: var(--color-surface, #F4F7FB);
        color: var(--color-text, #0B1220);
        color-scheme: light;
      }
      #app-shell .page-shell { padding: 40px 48px; }
      #app-shell.has-side-nav #app-content {
        margin-left: var(--sidenav-width, 260px);
        transition: margin-left 0.2s ease;
      }
      #app-shell.has-side-nav.nav-collapsed #app-content {
        margin-left: var(--sidenav-width-collapsed, 68px);
      }
      @media (max-width: 768px) {
        #app-shell.has-side-nav #app-content { margin-left: 0; }
        #app-shell .page-shell { padding: 24px 20px; }
        #app-shell.has-side-nav.has-sub-nav #m5t-sub-nav { padding-left: 56px; }
        #m5t-sub-nav { z-index: 80; }
      }
    </style>

  <body>
    <div id="app-shell">
      <!-- Persona-aware left navigation (web component, outside #app so route renders
           never destroy it). Hidden until an authenticated route shows it. -->
      <m5t-side-nav id="m5t-side-nav" hidden></m5t-side-nav>
      <div id="app-content">
        <!-- Contextual top sub-nav: shown only when the active section has sub-items. -->
        <m5t-primary-nav id="m5t-sub-nav" data-show-secondary="false" data-hide-logo="true" hidden></m5t-primary-nav>
        <div id="app" data-sync-env="DEV" data-sync-theme="dark" data-sync-motif="brand" data-sync-lang="en"></div>
      </div>
    </div>
